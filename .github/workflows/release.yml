name: Phase 2 — Validate & Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate registry and marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin and skills
        run: bash scripts/validate.sh
      - name: Validate marketplace metadata
        run: bash scripts/validate-marketplace.sh

  build-synopsis:
    name: Build Synopsis (${{ matrix.rid }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            os: macos-14
            asset: synopsis-osx-arm64.tar.gz
          - rid: osx-x64
            os: macos-14
            asset: synopsis-osx-x64.tar.gz
          - rid: win-x64
            os: windows-latest
            asset: synopsis-win-x64.zip
          - rid: win-arm64
            os: windows-latest
            asset: synopsis-win-arm64.zip
          - rid: linux-x64
            os: ubuntu-latest
            asset: synopsis-linux-x64.tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            asset: synopsis-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Build and publish
        working-directory: src/synopsis
        run: |
          dotnet build Synopsis.sln -c Release
          dotnet test Synopsis.Tests -c Release --no-build
          dotnet publish Synopsis/Synopsis.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/${{ matrix.rid }}

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset }} -C src/synopsis/publish/${{ matrix.rid }} .

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path src/synopsis/publish/${{ matrix.rid }}/* -DestinationPath ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    name: Publish GitHub release
    needs: [validate, build-synopsis]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag/version alignment
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="$(jq -r '.version' .claude-plugin/plugin.json)"
          MARKETPLACE_VERSION="$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)"

          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) does not match plugin version ($PLUGIN_VERSION)"
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$MARKETPLACE_VERSION" ]; then
            echo "ERROR: plugin version ($PLUGIN_VERSION) does not match marketplace version ($MARKETPLACE_VERSION)"
            exit 1
          fi

      - name: Download Synopsis binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build skills archive
        run: |
          VERSION="$(jq -r '.version' .claude-plugin/plugin.json)"
          SKILL_COUNT="$(jq '.skills | length' .claude-plugin/plugin.json)"
          tar -czf "dotnet-episteme-skills-${VERSION}.tar.gz" .claude-plugin skills scripts README.md
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SKILL_COUNT=$SKILL_COUNT" >> "$GITHUB_ENV"

          # Extract changelog section for this version (between this header and the next)
          NOTES="$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)"
          # Store as multiline env var
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp dotnet-episteme-skills-${VERSION}.tar.gz release-files/
          # Move Synopsis archives from per-artifact directories
          find release-assets -name "synopsis-*" -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## DotNet Episteme Skills ${{ env.VERSION }}

            **Skills included:** ${{ env.SKILL_COUNT }}

            ${{ env.RELEASE_NOTES }}

            ---

            ### Synopsis binaries (auto-downloaded on first use)
            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `synopsis-osx-arm64.tar.gz` |
            | macOS Intel | `synopsis-osx-x64.tar.gz` |
            | Windows x64 | `synopsis-win-x64.zip` |
            | Windows arm64 | `synopsis-win-arm64.zip` |
            | Linux x64 | `synopsis-linux-x64.tar.gz` |
            | Linux arm64 | `synopsis-linux-arm64.tar.gz` |

            The detect script (`scripts/detect-tool.sh` / `.ps1`) auto-downloads the correct binary on first use. No manual install needed.

            ### Skills archive
            `dotnet-episteme-skills-${{ env.VERSION }}.tar.gz` contains all skill definitions for manual installation.
          files: release-files/*
